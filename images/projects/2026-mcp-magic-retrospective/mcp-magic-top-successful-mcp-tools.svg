<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="658" viewBox="0 0 1100 658" role="img">

<style>
  .title{font:700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#172026}
  .subtitle{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d6872}
  .label{font:650 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#172026}
  .value{font:500 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#25313a}
  .note{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d6872}
  .axis{stroke:#d8dee4;stroke-width:1}
</style>

