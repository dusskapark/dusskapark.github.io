<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title description">
  <title id="title">Successful MCP calls by design purpose</title>
  <desc id="description">A bar chart showing successful MCP tool calls by inferred design purpose. The three largest groups are content creation and text editing, structure and layout building, and visual styling.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcf4ff"/>
      <stop offset="1" stop-color="#c0e8fa"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#1274a1" stroke-opacity=".09" stroke-width="1"/>
    </pattern>
    <style>
      .eyebrow { font: 700 22px Arial, Helvetica, sans-serif; letter-spacing: 2.5px; fill: #0874aa; }
      .title { font: 800 63px Arial, Helvetica, sans-serif; letter-spacing: -3px; fill: #0b1322; }
      .subtitle { font: 600 22px Arial, Helvetica, sans-serif; fill: #263748; }
      .label { font: 700 23px Arial, Helvetica, sans-serif; fill: #0e1520; }
      .value { font: 700 23px Arial, Helvetica, sans-serif; fill: #0e1520; }
      .axis { font: 600 17px Arial, Helvetica, sans-serif; fill: #445462; }
      .takeaway { font: 800 34px Arial, Helvetica, sans-serif; letter-spacing: -1.3px; fill: #0b1322; }
      .note { font: 600 18px Arial, Helvetica, sans-serif; fill: #273541; }
    </style>
  </defs>
  <rect width="1080" height="1350" fill="url(#background)"/>
  <rect width="1080" height="1350" fill="url(#grid)"/>
  <g transform="translate(78 78)">
    <text class="eyebrow" x="0" y="0">GA4 · SUCCESSFUL MCP TOOL CALLS</text>
    <text class="title" x="0" y="91">Where MCP work</text>
    <text class="title" x="0" y="159">concentrated</text>
    <text class="subtitle" x="0" y="209">Analyst-defined groups inferred from the most-used successful tool names</text>
    <line x1="0" y1="251" x2="924" y2="251" stroke="#0b1322" stroke-width="4"/>

    <line x1="0" y1="1116" x2="720" y2="1116" stroke="#7ca7b8" stroke-width="2"/>
    <g class="axis">
      <text x="0" y="1147">0</text><text x="164" y="1147">40K</text><text x="344" y="1147">80K</text><text x="518" y="1147">120K</text><text x="688" y="1147">160K</text>
    </g>
    <g stroke="#678fa2" stroke-width="2">
      <line x1="0" y1="1107" x2="0" y2="1125"/><line x1="180" y1="1107" x2="180" y2="1125"/><line x1="360" y1="1107" x2="360" y2="1125"/><line x1="540" y1="1107" x2="540" y2="1125"/><line x1="720" y1="1107" x2="720" y2="1125"/>
    </g>

    <g transform="translate(0 300)">
      <text class="label" x="0" y="0">Content creation / text editing</text>
      <rect x="0" y="23" width="700" height="67" rx="8" fill="#146ee8"/>
      <text class="value" x="718" y="66">155,623 · 29.0%</text>
    </g>
    <g transform="translate(0 438)">
      <text class="label" x="0" y="0">Structure and layout building</text>
      <rect x="0" y="23" width="681" height="67" rx="8" fill="#ffae00"/>
      <text class="value" x="699" y="66">151,443 · 28.2%</text>
    </g>
    <g transform="translate(0 576)">
      <text class="label" x="0" y="0">Visual styling</text>
      <rect x="0" y="23" width="636" height="67" rx="8" fill="#08a784"/>
      <text class="value" x="654" y="66">141,524 · 26.4%</text>
    </g>
    <g transform="translate(0 714)">
      <text class="label" x="0" y="0">Inspection and context gathering</text>
      <rect x="0" y="23" width="260" height="67" rx="8" fill="#6d67ce"/>
      <text class="value" x="278" y="66">57,930 · 10.8%</text>
    </g>
    <g transform="translate(0 852)">
      <text class="label" x="0" y="0">Asset export</text>
      <rect x="0" y="23" width="61" height="67" rx="8" fill="#7c8a00"/>
      <text class="value" x="79" y="66">13,536 · 2.5%</text>
    </g>
    <g transform="translate(0 990)">
      <text class="label" x="0" y="0">Maintenance and cleanup</text>
      <rect x="0" y="23" width="30" height="67" rx="8" fill="#cf3c35"/>
      <text class="value" x="48" y="66">6,757 · 1.3%</text>
    </g>

    <line x1="0" y1="1190" x2="924" y2="1190" stroke="#0b1322" stroke-width="4"/>
    <text class="takeaway" x="0" y="1242">72.8% of successful calls created, structured, or styled.</text>
  </g>
</svg>
