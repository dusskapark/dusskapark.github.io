<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="442" viewBox="0 0 1100 442" role="img">

<style>
  .title{font:700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#172026}
  .subtitle{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d6872}
  .label{font:650 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#172026}
  .value{font:500 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#25313a}
  .note{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d6872}
  .axis{stroke:#d8dee4;stroke-width:1}
</style>

<rect width="100%" height="100%" fill="#ffffff"/>
<text x="32" y="42" class="title">Successful MCP Calls By Design Purpose</text>
<text x="32" y="68" class="subtitle">GA4 successful MCP tool calls, grouped by inferred design purpose</text>
<line x1="310" y1="62" x2="310" y2="338" class="axis"/>
<g>
<text x="32" y="104" class="label">Content creation / text editing</text>
<rect x="310" y="86" width="560" height="24" rx="5" fill="#1266d6"/>
<text x="884" y="104" class="value">155,623 · 29.0%</text>
</g>
<g>
<text x="32" y="148" class="label">Structure and layout building</text>
<rect x="310" y="130" width="545" height="24" rx="5" fill="#a15c00"/>
<text x="869" y="148" class="value">151,443 · 28.2%</text>
</g>
<g>
<text x="32" y="192" class="label">Visual styling</text>
<rect x="310" y="174" width="509" height="24" rx="5" fill="#0c8c72"/>
<text x="833" y="192" class="value">141,524 · 26.4%</text>
</g>
<g>
<text x="32" y="236" class="label">Inspection and context gathering</text>
<rect x="310" y="218" width="208" height="24" rx="5" fill="#6463c8"/>
<text x="532" y="236" class="value">57,930 · 10.8%</text>
</g>
<g>
<text x="32" y="280" class="label">Asset export</text>
<rect x="310" y="262" width="49" height="24" rx="5" fill="#718300"/>
<text x="373" y="280" class="value">13,536 · 2.5%</text>
</g>
<g>
<text x="32" y="324" class="label">Maintenance and cleanup</text>
<rect x="310" y="306" width="24" height="24" rx="5" fill="#b3261e"/>
<text x="348" y="324" class="value">6,757 · 1.3%</text>
</g>
<text x="32" y="414" class="note">Takeaway: repeated use clustered around creating content, building layout structure, and visual styling.</text>
</svg>