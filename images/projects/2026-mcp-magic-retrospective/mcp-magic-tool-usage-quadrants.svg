<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="370" viewBox="0 0 1040 370" role="img">

<style>
  .title{font:700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#172026}
  .subtitle{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d6872}
  .label{font:650 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#172026}
  .value{font:500 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#25313a}
  .note{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d6872}
  .axis{stroke:#d8dee4;stroke-width:1}
</style>

<rect width="100%" height="100%" fill="#ffffff"/>
<text x="32" y="42" class="title">MCP Tool Usage Quadrants</text>
<text x="32" y="68" class="subtitle">Successful events by breadth and repeat intensity</text>
<line x1="310" y1="62" x2="310" y2="266" class="axis"/>
<g>
<text x="32" y="104" class="label">Broad + repeat-heavy</text>
<rect x="310" y="86" width="560" height="24" rx="5" fill="#1266d6"/>
<text x="884" y="104" class="value">442,564</text>
</g>
<g>
<text x="32" y="152" class="label">Broad + context/light repeat</text>
<rect x="310" y="134" width="50" height="24" rx="5" fill="#6463c8"/>
<text x="374" y="152" class="value">39,670</text>
</g>
<g>
<text x="32" y="200" class="label">Niche + repeat-heavy</text>
<rect x="310" y="182" width="45" height="24" rx="5" fill="#a15c00"/>
<text x="369" y="200" class="value">35,548</text>
</g>
<g>
<text x="32" y="248" class="label">Niche + light repeat</text>
<rect x="310" y="230" width="11" height="24" rx="5" fill="#b3261e"/>
<text x="335" y="248" class="value">9,031</text>
</g>
<text x="32" y="342" class="note">Thresholds from the Data Analytics report: Broad &gt;= 300 active users; repeat-heavy &gt;= 25 successful calls per active user.</text>
</svg>