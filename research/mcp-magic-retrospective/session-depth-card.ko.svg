<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">관측된 MCP 세션의 작업 깊이</title>
  <desc id="desc">최대 관측 span 12시간 36분, 최대 추정 MCP 호출 9,631회. 중앙 관측 span은 25분 31초, 세션당 추정 호출 중앙값은 11회이며, 상위 5퍼센트 세션이 전체 추정 호출의 55.1퍼센트를 차지한다.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7d9ff"/>
      <stop offset="55%" stop-color="#cbb3f5"/>
      <stop offset="100%" stop-color="#e6dcff"/>
    </linearGradient>
    <style>
      .sans { font-family: "Arial", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #090909; }
      .kicker { font-size: 24px; font-weight: 800; letter-spacing: 1.1px; fill: #1032bf; }
      .title { font-size: 64px; font-weight: 900; letter-spacing: -3px; }
      .dek { font-size: 25px; font-weight: 600; letter-spacing: -0.7px; }
      .section { font-size: 24px; font-weight: 900; letter-spacing: -0.7px; }
      .label { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
      .number { font-size: 76px; font-weight: 900; letter-spacing: -4px; }
      .number-small { font-size: 57px; font-weight: 900; letter-spacing: -3px; }
      .metric { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
      .caption { font-size: 19px; font-weight: 800; letter-spacing: -0.6px; }
      .foot { font-size: 15px; font-weight: 600; letter-spacing: -0.35px; }
      .blue { fill: #1032bf; }
      .line { stroke: #090909; stroke-width: 3; }
      .thin { stroke: #090909; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <text x="78" y="68" class="sans kicker">APTABASE · RELEASE BUILDS</text>
  <text x="78" y="148" class="sans title">일부 세션은 MCP를</text>
  <text x="78" y="216" class="sans title">오랫동안 반복해서 썼다</text>
  <text x="78" y="262" class="sans dek">연결 테스트를 넘어, 실제 디자인 작업이 이어졌다는 신호다.</text>
  <line x1="78" y1="294" x2="1002" y2="294" class="line"/>

  <text x="78" y="344" class="sans section">가장 오래·많이 쓴 세션</text>
  <rect x="78" y="368" width="924" height="236" rx="8" fill="#fff" fill-opacity="0.27"/>
  <text x="118" y="416" class="sans label">가장 길게 기록된 세션</text>
  <text x="118" y="516" class="sans number">12시간 36분</text>
  <text x="118" y="558" class="sans metric">첫 이벤트부터 마지막 이벤트까지</text>
  <line x1="546" y1="400" x2="546" y2="572" class="thin"/>
  <text x="590" y="416" class="sans label">한 세션에서 가장 많이 호출</text>
  <text x="590" y="516" class="sans number">9,631</text>
  <text x="878" y="516" class="sans metric">회</text>
  <text x="590" y="552" class="sans metric">로그를 기준으로 계산한 추정치</text>

  <line x1="78" y1="638" x2="1002" y2="638" class="line"/>
  <text x="78" y="686" class="sans section">보통 세션과 오래 쓴 세션의 차이</text>
  <rect x="78" y="710" width="438" height="274" rx="8" fill="#fff" fill-opacity="0.27"/>
  <rect x="564" y="710" width="438" height="274" rx="8" fill="#fff" fill-opacity="0.27"/>
  <text x="112" y="758" class="sans label">보통 MCP 세션</text>
  <text x="112" y="844" class="sans number">25:31</text>
  <text x="112" y="875" class="sans metric">기록된 시간의 가운데값</text>
  <text x="112" y="944" class="sans number-small">11</text>
  <text x="220" y="944" class="sans metric">한 세션당 MCP 호출</text>
  <text x="598" y="758" class="sans label">오래 쓴 상위 5% 세션</text>
  <text x="598" y="844" class="sans number">2:12:54</text>
  <text x="598" y="875" class="sans metric">상위 5%가 시작되는 지점</text>
  <text x="598" y="944" class="sans number-small">367</text>
  <text x="786" y="944" class="sans metric">한 세션당 MCP 호출</text>

  <line x1="78" y1="1020" x2="1002" y2="1020" class="line"/>
  <text x="78" y="1068" class="sans section">상위 5% 세션이 MCP 호출의 절반 이상을 만들었다</text>
  <text x="78" y="1110" class="sans metric">전체 세션 중 상위 5% · 119개 세션</text>
  <rect x="78" y="1130" width="924" height="24" fill="#f6f2ff"/>
  <rect x="78" y="1130" width="51" height="24" fill="#1032bf"/>
  <text x="78" y="1188" class="sans metric">전체 MCP 호출 중</text>
  <rect x="78" y="1208" width="924" height="30" fill="#f6f2ff"/>
  <rect x="78" y="1208" width="509" height="30" fill="#1032bf"/>
  <text x="610" y="1234" class="sans number-small blue">55.1%</text>

  <line x1="78" y1="1266" x2="1002" y2="1266" class="line"/>
  <text x="78" y="1295" class="sans foot">참고: release 세션 9,774개 중 MCP를 쓴 세션은 2,376개</text>
  <text x="78" y="1321" class="sans foot">시간은 첫·마지막 이벤트 사이의 기록 구간 · 호출 수는 묶인 로그를 펼친 추정치</text>
  <text x="78" y="1342" class="sans foot">동일 행 반복으로 극단 호출은 개별 작업으로 단정할 수 없음</text>
</svg>
